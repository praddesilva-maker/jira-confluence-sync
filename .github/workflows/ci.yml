name: ci

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Check Node version
        run: npm run check:node

      - name: Install backend deps
        run: npm ci

      - name: Install frontend deps
        run: npm ci --prefix static/review-ui

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  # Deploys + installs to the Forge production environment on every push to main,
  # via scripts/deploy.mjs (--yes skips the typed "production" confirmation prompt,
  # which only makes sense interactively). Disabled until FORGE_EMAIL and
  # FORGE_API_TOKEN are added as repo secrets, and deploy.config.json is present
  # (it's gitignored — see README "Enabling production deploy" and "Deploying").
