name: ci

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install backend deps
        run: npm ci

      - name: Install frontend deps
        run: npm ci --prefix static/review-ui

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  # Deploys to the Forge staging environment on every push to main. Disabled until
