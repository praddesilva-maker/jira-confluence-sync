modules:
  jira:globalPage:
    - key: initiative-sync-global-page
      resource: main
      resolver:
        function: resolver-func
      title: Initiative Sync

  function:
    - key: resolver-func
      handler: index.handler

resources:
  - key: main
    path: static/review-ui/dist

app:
  # Placeholder — `forge register` overwrites this with your real app ARI.
  # Do not deploy with this placeholder; see README "Manual setup" section.
  id: ari:cloud:ecosystem::app/00000000-0000-0000-0000-000000000000
  runtime:
    name: nodejs22.x

permissions:
  scopes:
    - storage:app
